---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "1h"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  distribution:
    version: 2.x
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - image-automation-controller
  cluster:
    size: small
  sync:
    interval: 1m
    kind: GitRepository
    path: ./gitops
    ref: refs/heads/main
    url: https://github.com/cmacsithigh/homelab.git